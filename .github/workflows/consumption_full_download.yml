name: Full Conso Download

permissions:
  contents: write

on:
  workflow_dispatch:  # Déclenchement manuel

jobs:
  download-full-consumption:
    runs-on: ubuntu-latest
    env:
      ENEDIS_TOKEN: ${{ secrets.ENEDIS_TOKEN }}
      LINKY_PRM: ${{ secrets.LINKY_PRM }}
      PYTHONPATH: .
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv requests

      - name: Run full consumption download script
        run: |
          echo "🚀 Starting full Enedis download..."
          python conso_api_tools/fetch_history.py

      - name: � Download electricity price history
        if: ${{ env.PRICE_DATA_URL != '' }}
        env:
          PRICE_DATA_URL: ${{ vars.PRICE_DATA_URL }}
        run: |
          python conso_api_tools/fetch_price_history.py

      - name: �💾 Commit consumption data to repository
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          # Affichage debug
          git status
          
          # Ajouter uniquement data/
          git add -f data/
          
          # Commit seulement s'il y a des changements
          git diff --cached --quiet || git commit -m "📊 Mise à jour automatique des données de consommation"
          
          # Push vers main
          git push