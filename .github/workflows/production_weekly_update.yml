name: Weekly Production Update (Hoymiles)

permissions:
  contents: write

on:
  schedule:
    # Tous les lundis à 06h00 UTC (≈ 07h00-08h00 France)
    - cron: "0 6 * * 1"
  workflow_dispatch:  # Déclenchement manuel possible

concurrency:
  group: weekly-production-update
  cancel-in-progress: false  # Empêche les exécutions simultanées

jobs:
  update-production-weekly:
    runs-on: ubuntu-latest
    env:
      HOYMILES_USER: ${{ secrets.HOYMILES_USER }}
      HOYMILES_PASSWORD: ${{ secrets.HOYMILES_PASSWORD }}
      HOYMILES_TOKEN: ${{ secrets.HOYMILES_TOKEN }}
      PYTHONPATH: .
    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📥 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install python-dotenv 

      - name: ⚡ Run weekly update script
        run: |
          echo "🚀 Starting weekly Hoymiles update..."
          python prod_api_tools/fetch_history.py

      - name: 💾 Commit and push updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add -f data/
          git commit -m "🗓️ Mise à jour hebdomadaire des données de production" || echo "Aucun changement à valider"
          git push
